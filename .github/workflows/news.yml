name: Refresh news feed

on:
  schedule:
    - cron: "8 * * * *"   # hourly, offset to avoid top-of-hour congestion
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and aggregate news
        run: python3 scripts/fetch_news.py

      - name: Commit if changed
        run: |
          git config user.name "news-bot"
          git config user.email "actions@github.com"
          git add data/news.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh news feed"
            git push
          fi
